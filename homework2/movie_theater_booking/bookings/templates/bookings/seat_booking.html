{% extends 'bookings/base.html' %}
{% block title %}Book Seat{% endblock %}
{% block content %}
<h2>Book a Seat</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="seat_number" class="form-label">Seat Number</label>
        <input type="text" class="form-control" id="seat_number" name="seat_number">
    </div>
    <button type="submit" class="btn btn-success">Book Seat</button>
</form>
{% endblock %}
